name: build-scan-sign-deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

env:
  IMAGE: ghcr.io/someshc04/ledger-api

jobs:
  secrets-scan:
    name: Secrets Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks (full scan, no base/head diff)
        run: |
          docker run --rm -v "$PWD":/repo zricethezav/gitleaks:latest \
            detect --source="/repo" --no-git -v --exit-code 1 --config="/repo/.gitleaks.toml" \
            --report-format sarif --report-path /repo/gitleaks-results.sarif
        # Fail policy: HARD BLOCK. Any verified secret match fails the job
        # and stops the pipeline. Scans the full working tree directly
        # (--no-git) rather than diffing commit SHAs from the push event,
        # which was unreliable after this repo's remote was repointed.
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gitleaks-results.sarif

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: p/security-audit p/python p/flask
          generateSarif: "1"
        continue-on-error: true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  dependency-scan:
    name: Dependency/CVE Scan (Trivy - filesystem)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan (table, human-readable)
        run: |
          docker run --rm -v "$PWD/app":/app aquasec/trivy:latest fs /app \
            --severity CRITICAL,HIGH --exit-code 1
        # Fail policy: HARD BLOCK on CRITICAL/HIGH CVEs in dependencies.
      - name: Trivy filesystem scan (SARIF for Security tab)
        if: always()
        run: |
          docker run --rm -v "$PWD/app":/app -v "$PWD":/out aquasec/trivy:latest fs /app \
            --severity CRITICAL,HIGH --format sarif --output /out/trivy-fs-results.sarif || true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif

  build-and-push:
    name: Build & Push Image
    needs: [secrets-scan, sast, dependency-scan]
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push (immutable tag by commit SHA)
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}

  image-scan:
    name: Image Scan (Trivy - container)
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Trivy image scan (table, human-readable)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $HOME/.docker/config.json:/root/.docker/config.json:ro \
            aquasec/trivy:latest image ${{ env.IMAGE }}@${{ needs.build-and-push.outputs.digest }} \
            --severity CRITICAL,HIGH --exit-code 1
        # Fail policy: HARD BLOCK on CRITICAL/HIGH CVEs in the built image
        # (catches OS-package CVEs from the base image, not just Python deps).

  sign-and-attest:
    name: Sign Image + SLSA Provenance (Cosign)
    needs: [build-and-push, image-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign image (keyless)
        run: |
          cosign sign --yes \
            ${{ env.IMAGE }}@${{ needs.build-and-push.outputs.digest }}
      - name: Generate SLSA-style provenance attestation
        run: |
          cosign attest --yes \
            --predicate <(echo '{
              "buildType": "github-actions",
              "builder": "${{ github.workflow }}",
              "invocation": {
                "configSource": {
                  "uri": "${{ github.repositoryUrl }}",
                  "digest": {"sha1": "${{ github.sha }}"}
                }
              },
              "metadata": {
                "buildInvocationId": "${{ github.run_id }}"
              }
            }') \
            --type slsaprovenance \
            ${{ env.IMAGE }}@${{ needs.build-and-push.outputs.digest }}

  deploy-gitops:
    name: Update GitOps manifest (ArgoCD source of truth)
    needs: sign-and-attest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update image tag in manifest
        run: |
          sed -i "s|image: ledger-api:.*|image: ${{ env.IMAGE }}:${{ github.sha }}|" deploy/deployment.yaml
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add deploy/deployment.yaml
          git commit -m "ci: deploy ${{ github.sha }}" || echo "no changes"
          git push
